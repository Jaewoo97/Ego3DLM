<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ego3DLM — Semantic Scene-Awareness QA</title>
<link rel="icon" href="../images/favicon.ico">
<style>
  :root{--ink:#222;--sub:#666;--line:#e6e8ec;--accent:#2b57a5;}
  *{box-sizing:border-box;}
  html,body{margin:0;font-family:'Noto Sans',system-ui,sans-serif;color:var(--ink);background:#f2f3f5;}
  #bar{position:sticky;top:0;z-index:5;background:#fff;border-bottom:1px solid var(--line);
       padding:10px 14px;display:flex;flex-wrap:wrap;gap:10px 16px;align-items:center;}
  .grp{display:flex;align-items:center;gap:7px;}
  label.k{font-size:12px;color:var(--sub);text-transform:uppercase;letter-spacing:.04em;}
  select{font:inherit;font-size:13px;padding:5px 9px;border:1px solid var(--line);border-radius:7px;background:#fff;cursor:pointer;}
  #types{display:flex;flex-wrap:wrap;gap:6px;}
  .tchip{font-size:12.5px;padding:4px 10px;border-radius:999px;border:1px solid var(--line);
         background:#fff;cursor:pointer;user-select:none;text-transform:capitalize;}
  .tchip .dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:5px;vertical-align:-1px;}
  .tchip.off{opacity:.4;}
  #count{font-size:12px;color:var(--sub);margin-left:auto;}
  #grid{padding:14px;display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;}
  .card{background:#fff;border:1px solid var(--line);border-radius:12px;overflow:hidden;
        box-shadow:0 1px 4px rgba(0,0,0,.05);display:flex;flex-direction:column;}
  .card img{width:100%;aspect-ratio:1/1;object-fit:cover;display:block;background:#ddd;}
  .qa{padding:9px 11px;border-top:1px solid #f0f1f3;font-size:13px;}
  .qa:first-of-type{border-top:0;}
  .qa .badge{display:inline-block;font-size:10.5px;padding:1px 7px;border-radius:999px;color:#fff;
             text-transform:capitalize;margin-bottom:3px;}
  .qa .q{font-weight:600;}
  .qa .a{color:#374151;}
  .qa .a::before{content:"→ ";color:var(--accent);}
  #empty{padding:30px;text-align:center;color:var(--sub);display:none;}
</style>
</head>
<body>
  <div id="bar">
    <div class="grp"><label class="k" for="scene">Scene</label><select id="scene"></select></div>
    <div id="types"></div>
    <span id="count"></span>
  </div>
  <div id="grid"></div>
  <div id="empty">No QA of this type in this scene.</div>
<script src="semantic.js"></script>
</body>
</html>
